# Local dev infra for BOCC.
# Postgres ships with the pgvector extension preinstalled (for the Path B
# selfie-match fallback: storing face embeddings and doing cosine search in our DB).
# Port 5433 on the host to avoid clashing with a system Postgres or Immich's own DB.
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bocc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bocc
      POSTGRES_PASSWORD: bocc
      POSTGRES_DB: bocc
    ports:
      - "5433:5432"
    volumes:
      - bocc-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bocc -d bocc"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: bocc-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"

volumes:
  bocc-pg:
