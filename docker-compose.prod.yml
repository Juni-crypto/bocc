# BOCC production stack: the WHOLE system on one host, fully containerized.
#
# Database and storage run IN CONTAINERS (no managed Postgres, no object store):
#   - db .............. our app Postgres (pgvector), data in a named volume
#   - api ............. NestJS BFF, applies Prisma migrations on boot
#   - web ............. Next.js, built with NEXT_PUBLIC_API_URL baked in
#   - immich-server ... Immich engine (AI + media), storage in a named volume
#   - immich-machine-learning / immich-redis / immich-db ... Immich support
#
# Only web (3000) and api (4000) are published. The databases and Immich stay
# on the internal `bocc` network and are NOT reachable from outside the host.
#
# Bring up:   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# Tear down:  docker compose -f docker-compose.prod.yml --env-file .env.prod down
#             (add -v to also wipe the DB + Immich storage volumes)
#
# Configuration comes from a .env.prod file (see .env.prod.example). The
# default ships with IMMICH_ENABLED=false so the stack comes up cleanly before
# an Immich API key exists. See the README for the post-up step to enable AI.

name: bocc

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-bocc}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bocc}
      POSTGRES_DB: ${DB_NAME:-bocc}
    volumes:
      - bocc-db-data:/var/lib/postgresql/data
    # NOT published. Reachable only as `db:5432` on the internal network.
    networks:
      - bocc
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bocc} -d ${DB_NAME:-bocc}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-bocc}:${DB_PASSWORD:-bocc}@db:5432/${DB_NAME:-bocc}?schema=public
      IMMICH_ENABLED: ${IMMICH_ENABLED:-false}
      IMMICH_URL: http://immich-server:2283
      IMMICH_API_KEY: ${IMMICH_API_KEY:-}
      API_PUBLIC_URL: ${PUBLIC_API_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: "4000"
    ports:
      - "4000:4000"
    networks:
      - bocc

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_API_URL is inlined at build time. PUBLIC_API_URL is the
        # public API origin (e.g. http://1.2.3.4:4000); the web client needs the
        # /api base path appended.
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}/api
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks:
      - bocc

  # ---------- Immich engine (copied from immich-stack/docker-compose.yml) ----------
  immich-server:
    container_name: bocc_immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-v1.124.2}
    volumes:
      - bocc-immich-upload:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      DB_HOSTNAME: immich-db
      DB_USERNAME: ${IMMICH_DB_USERNAME:-immich}
      DB_PASSWORD: ${IMMICH_DB_PASSWORD:-immich}
      DB_DATABASE_NAME: ${IMMICH_DB_DATABASE_NAME:-immich}
      REDIS_HOSTNAME: immich-redis
      UPLOAD_LOCATION: /data
    # NOT published. Only the api talks to it over the internal network.
    depends_on:
      - immich-redis
      - immich-db
    restart: always
    networks:
      - bocc
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: bocc_immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-v1.124.2}
    volumes:
      - bocc-immich-model-cache:/cache
    restart: always
    networks:
      - bocc
    healthcheck:
      disable: false

  immich-redis:
    container_name: bocc_immich_redis
    image: docker.io/valkey/valkey:9@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
    restart: always
    networks:
      - bocc
    healthcheck:
      test: redis-cli ping || exit 1

  immich-db:
    container_name: bocc_immich_postgres
    # Immich requires its bundled Postgres image (vectorchord + pgvecto.rs).
    # This is SEPARATE from our app db (pgvector/pgvector:pg16).
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD:-immich}
      POSTGRES_USER: ${IMMICH_DB_USERNAME:-immich}
      POSTGRES_DB: ${IMMICH_DB_DATABASE_NAME:-immich}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - bocc-immich-db:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    networks:
      - bocc
    healthcheck:
      disable: false

networks:
  bocc:
    driver: bridge

volumes:
  bocc-db-data:
  bocc-immich-upload:
  bocc-immich-model-cache:
  bocc-immich-db:
