# Netlify config for the BOCC web app. Pick "apps/web" as the project/base
# directory when connecting the repo; Netlify reads this file from that base.
# Netlify installs the npm-workspace deps from the repo root automatically.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NEXT_PUBLIC_API_URL = "https://65-2-145-227.sslip.io/api"
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
