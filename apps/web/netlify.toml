# Netlify config for the BOCC web app (npm-workspaces monorepo).
# Connect the repo with package directory = apps/web. Netlify reads this file
# but runs the build from the REPO ROOT, so paths/commands here are root-relative.

[build]
  # Netlify installs deps first. We then re-resolve the Tailwind v4 native
  # binaries (npm can omit cross-platform optional deps, npm/cli#4828) and build
  # only the web workspace.
  command = "npm install --no-save lightningcss @tailwindcss/oxide && npm run build -w @bocc/web"
  publish = "apps/web/.next"

[build.environment]
  NEXT_PUBLIC_API_URL = "https://65-2-145-227.sslip.io/api"
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
