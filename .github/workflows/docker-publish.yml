name: Publish container images to GHCR

# Builds the api + web images and pushes them to the GitHub Container Registry
# so the whole system can be run from prebuilt images (docker-compose.ghcr.yml).
# Triggers on a v* tag (same as the APK release) or manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: apps/api/Dockerfile
            image: ghcr.io/juni-crypto/bocc-api
          - name: web
            dockerfile: apps/web/Dockerfile
            image: ghcr.io/juni-crypto/bocc-web
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.PUBLIC_API_URL && format('{0}/api', vars.PUBLIC_API_URL) || 'http://localhost:4000/api' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
