name: Build Android APK and Release

# Triggers:
#  - push a tag like v0.1.0  -> builds + publishes a release for that tag
#  - manual run (workflow_dispatch) -> provide a tag in the input
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0-rc1"
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # exposed to the build; the app falls back to localhost when unset.
      EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'http://localhost:4000/api' }}
      # optional: set this repo secret to auto-scan the APK on VirusTotal.
      VT_API_KEY: ${{ secrets.VT_API_KEY }}
      TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prebuild native Android project
        working-directory: apps/mobile
        run: npx expo prebuild -p android --no-install

      - name: Build release APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease -x lint --no-daemon --console=plain

      - name: Stage artifact + checksum
        run: |
          set -euo pipefail
          APK=apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          OUT="bocc-${TAG}.apk"
          cp "$APK" "$OUT"
          sha256sum "$OUT" | tee SHA256SUMS.txt
          echo "APK_PATH=$OUT" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: BOCC ${{ env.TAG }}
          prerelease: ${{ github.event.inputs.prerelease || false }}
          generate_release_notes: true
          body: |
            ### BOCC Android APK

            Built from source by GitHub Actions (no manual tampering). Verify with the
            checksum in `SHA256SUMS.txt`, and see the VirusTotal analysis link below if a
            `VT_API_KEY` secret is configured.

            Install: download `bocc-${{ env.TAG }}.apk` and open it on an Android device
            (allow installing from unknown sources). The app talks to whatever API you point
            `EXPO_PUBLIC_API_URL` at.
          files: |
            ${{ env.APK_PATH }}
            SHA256SUMS.txt

      - name: VirusTotal scan (optional, runs when VT_API_KEY secret is set)
        if: ${{ env.VT_API_KEY != '' }}
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ env.VT_API_KEY }}
          update_release_body: true
          files: |
            ${{ env.APK_PATH }}
